services:
  postgres:
    image: postgres:16
    container_name: smart-luggage-postgres
    environment:
      POSTGRES_DB: smart_luggage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smart_luggage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_luggage"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smart_luggage_data:
